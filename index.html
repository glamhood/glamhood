<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Moja strona</title>
</head>
<body> 
  <font-family: "Courier New", monospace>
  <font color=#FF99CC>
    <font size=70>
  <style>
#menu {
  height: 100%;
  width: 0;
  position: fixed;
  top: 0;
  left: 0;
  background: #1A237E !important;
  overflow-x: hidden;
  transition: 0.3s;
  padding-top: 60px;
}

#menu a {
  display: block;
  color: white;
  padding: 30px;
  text-decoration: none;
  font-size: 50; !important;  
  font-family: "Courier New", monospace;
}

#menu a:hover {
  background: #555;
}

.przycisk {
  font-size: 55px;
  cursor: pointer;
  user-select: none;
}
</style>

<span class="przycisk" onclick="otworz()">☰</span>

<div id="menu">
 <font color=#FF99CC>
  <a href="javascript:void(0)" onclick="zamknij()">✖</a>
  <a href="./index.html">Strona główna</a>
  <a href="#">Profil</a>
  <a href="#">Ustawienia</a>
  <a href="./kontakt.html">Kontakt</a>
</div>

<script>
function otworz() {
  document.getElementById("menu").style.width = "65vw";
}

function zamknij() {
  document.getElementById("menu").style.width = "0";
}
</script>
    <h1>Witaj!</h1>
  <p>To moja pierwsza strona internetowa.</p>
</body>
</html>
